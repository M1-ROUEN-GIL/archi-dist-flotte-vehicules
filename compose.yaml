services:
  # Un seul PostgreSQL ; bases métier par service ; Keycloak utilise la base par défaut "postgres" (pas de script SQL dédié).
  postgres:
    image: timescale/timescaledb:2.14.2-pg15
    container_name: flotte-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: flotte-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.7.0
    container_name: flotte-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    restart: unless-stopped

  keycloak:
    # Version épinglée — :latest (26+) exige KC_BOOTSTRAP_ADMIN_* (KEYCLOAK_ADMIN est déprécié)
    image: quay.io/keycloak/keycloak:26.5.7
    container_name: flotte-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/postgres?sslmode=disable
      KC_DB_USERNAME: admin
      KC_DB_PASSWORD: password
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: "xforwarded"
      KC_HTTP_RELATIVE_PATH: "/auth"
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json
    depends_on:
      postgres:
        condition: service_started
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: flotte-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@flotte.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

  vehicle:
    build:
      context: ./services/vehicle-service
      dockerfile: Dockerfile
    container_name: flotte-vehicle
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/vehicle_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password
      - KAFKA_BROKER=kafka:9092
      - KEYCLOAK_ISSUER_URI=http://keycloak:8080/auth/realms/gestion-flotte
      - KEYCLOAK_JWK_SET_URI=http://keycloak:8080/auth/realms/gestion-flotte/protocol/openid-connect/certs
      - JAVA_TOOL_OPTIONS=-javaagent:/app/opentelemetry-javaagent.jar
      - OTEL_SERVICE_NAME=vehicle-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_INSTRUMENTATION_LOGBACK_APPENDER_ENABLED=true
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - kafka
    restart: unless-stopped

  maintenance:
    build:
      context: ./services/maintenance-service
      dockerfile: Dockerfile
    container_name: flotte-maintenance
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/maintenance_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KEYCLOAK_ISSUER_URI=http://keycloak:8080/auth/realms/gestion-flotte
      - KEYCLOAK_JWK_SET_URI=http://keycloak:8080/auth/realms/gestion-flotte/protocol/openid-connect/certs
      - JAVA_TOOL_OPTIONS=-javaagent:/app/opentelemetry-javaagent.jar
      - OTEL_SERVICE_NAME=maintenance-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_INSTRUMENTATION_LOGBACK_APPENDER_ENABLED=true
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_started
      keycloak:
        condition: service_started
    restart: unless-stopped

  driver:
    build:
      context: ./services/driver-service
      dockerfile: Dockerfile
    container_name: flotte-driver
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/driver_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password
      - KAFKA_BROKER=kafka:9092
      - KEYCLOAK_ISSUER_URI=http://keycloak:8080/auth/realms/gestion-flotte
      - KEYCLOAK_JWK_SET_URI=http://keycloak:8080/auth/realms/gestion-flotte/protocol/openid-connect/certs
      - JAVA_TOOL_OPTIONS=-javaagent:/app/opentelemetry-javaagent.jar
      - OTEL_SERVICE_NAME=driver-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_INSTRUMENTATION_LOGBACK_APPENDER_ENABLED=true
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_started
      keycloak:
        condition: service_started
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: flotte-gateway
    environment:
      - VEHICLE_SERVICE_URL=http://vehicle:8080
      - DRIVER_SERVICE_URL=http://driver:8080
      - MAINTENANCE_SERVICE_URL=http://maintenance:8080
      - OTEL_SERVICE_NAME=graphql-gateway
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    ports:
      - "4000:4000"
    depends_on:
      - vehicle
      - driver
      - maintenance
    restart: unless-stopped

volumes:
  postgres_data:
