services:
  # 1. Base de données PostgreSQL + TimescaleDB pour le service Véhicules
  postgres:
    image: timescale/timescaledb:2.14.2-pg15
    container_name: flotte-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flotte_db
    ports:
      - "5432:5432"
    volumes:
      # --- 1. SCHÉMAS (01 à 10) ---
      - ./services/vehicle-service/db/migrations/01-vehicle.sql:/docker-entrypoint-initdb.d/01-vehicle.sql

      # --- 2. DONNÉES / SEEDS (20 à 30) ---
      - ./services/vehicle-service/db/seeds/20-vehicle-seed.sql:/docker-entrypoint-initdb.d/20-vehicle-seed.sql

      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 1b. Base de données PostgreSQL pour le service Maintenance
  postgres-maintenance:
    image: postgres:15-alpine
    container_name: flotte-postgres-maintenance
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: maintenance_db
    ports:
      - "5435:5432"
    volumes:
      - ./db/03-maintenance.sql:/docker-entrypoint-initdb.d/01-maintenance.sql
      - postgres_maintenance_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. Redis (Version 7.2)
  redis:
    image: redis:7.2-alpine
    container_name: flotte-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # 3. Apache Kafka (Configuration robuste pour Docker)
  kafka:
    image: apache/kafka:3.7.0
    container_name: flotte-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  # 4. Keycloak (Avec chemin /auth pour cohérence Kube)
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: flotte-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/flotte_db
      KC_DB_USERNAME: admin
      KC_DB_PASSWORD: password
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: "xforwarded"
      KC_HTTP_RELATIVE_PATH: "/auth"
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json
    depends_on:
      - postgres
    restart: unless-stopped

  # 5. Interface d'administration web pour PostgreSQL (Façon phpMyAdmin)
  pgadmin:
    image: dpage/pgadmin4
    container_name: flotte-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@flotte.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

  # 6. Microservice Véhicules (Spring Boot)
  vehicle:
    build:
      context: ./services/vehicle-service
      dockerfile: Dockerfile
    container_name: flotte-vehicle
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/flotte_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      # Configuration pour l'Agent Java OpenTelemetry
      - OTEL_SERVICE_NAME=vehicle-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - KEYCLOAK_ISSUER_URI=http://keycloak:8080/auth/realms/gestion-flotte
      - KEYCLOAK_JWK_SET_URI=http://keycloak:8080/auth/realms/gestion-flotte/protocol/openid-connect/certs
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - kafka
      - keycloak
    restart: unless-stopped

  # 7. Microservice Maintenance (Spring Boot)
  maintenance:
    build:
      context: ./services/maintenance-service
      dockerfile: Dockerfile
    container_name: flotte-maintenance
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-maintenance:5432/maintenance_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KEYCLOAK_ISSUER_URI=http://keycloak:8080/auth/realms/gestion-flotte
      - KEYCLOAK_JWK_SET_URI=http://keycloak:8080/auth/realms/gestion-flotte/protocol/openid-connect/certs
      - OTEL_SERVICE_NAME=maintenance-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
    ports:
      - "8082:8080"
    depends_on:
      - postgres-maintenance
      - kafka
      - keycloak
    restart: unless-stopped

volumes:
  postgres_data:
  postgres_maintenance_data:
  kafka_data:
