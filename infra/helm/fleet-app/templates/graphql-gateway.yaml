apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphql-gateway-deployment
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: graphql-gateway
  template:
    metadata:
      labels:
        app: graphql-gateway
    spec:
      containers:
        - name: graphql-gateway
          image: {{ .Values.graphqlGateway.image | default "graphql-gateway:latest" }}
          imagePullPolicy: Never
          ports:
            - containerPort: {{ .Values.graphqlGateway.port | default 4000 }}
          env:
            - name: VEHICLE_SERVICE_URL
              value: "http://vehicle-service:8080"
            - name: DRIVER_SERVICE_URL
              value: "http://driver-service:8080"
            - name: MAINTENANCE_SERVICE_URL
              value: "http://maintenance-service:8080"
            - name: OTEL_SERVICE_NAME
              value: "graphql-gateway"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.{{ .Values.namespace }}.svc.cluster.local:4318"
---
apiVersion: v1
kind: Service
metadata:
  name: graphql-gateway-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: graphql-gateway
  ports:
    - protocol: TCP
      port: {{ .Values.graphqlGateway.port | default 4000 }}
      targetPort: {{ .Values.graphqlGateway.port | default 4000 }}
  type: ClusterIP
