apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphql-gateway-deployment
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  # maxSurge: 0 → pas de 2e pod pendant le rollout (sinon sur Minikube le pod reste Pending faute de ressources)
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: graphql-gateway
  template:
    metadata:
      labels:
        app: graphql-gateway
    spec:
      containers:
        - name: graphql-gateway
          image: {{ .Values.graphqlGateway.image | default "graphql-gateway:latest" }}
          imagePullPolicy: Never
          ports:
            - containerPort: {{ .Values.graphqlGateway.port | default 4000 }}
          startupProbe:
            tcpSocket:
              port: {{ .Values.graphqlGateway.port | default 4000 }}
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 24
          readinessProbe:
            tcpSocket:
              port: {{ .Values.graphqlGateway.port | default 4000 }}
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: {{ .Values.graphqlGateway.port | default 4000 }}
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 4
          env:
            - name: VEHICLE_SERVICE_URL
              value: "http://vehicle-service.{{ .Values.namespace }}.svc.cluster.local:8080"
            - name: DRIVER_SERVICE_URL
              value: "http://driver-service.{{ .Values.namespace }}.svc.cluster.local:8080"
            - name: MAINTENANCE_SERVICE_URL
              value: "http://maintenance-service.{{ .Values.namespace }}.svc.cluster.local:8080"
            - name: EVENTS_SERVICE_URL
              value: "http://events-service.{{ .Values.namespace }}.svc.cluster.local:8080"
            - name: KAFKA_BROKER
              value: "kafka-service.{{ .Values.namespace }}.svc.cluster.local:9092"
            - name: LOCATION_SERVICE_URL
              value: "http://location-service.{{ .Values.namespace }}.svc.cluster.local:3000"
            - name: LOCATION_GRPC_URL
              value: "location-service.{{ .Values.namespace }}.svc.cluster.local:50051"
            - name: OTEL_SERVICE_NAME
              value: "graphql-gateway"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.{{ .Values.namespace }}.svc.cluster.local:4318"
---
apiVersion: v1
kind: Service
metadata:
  name: graphql-gateway-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: graphql-gateway
  ports:
    - protocol: TCP
      port: {{ .Values.graphqlGateway.port | default 4000 }}
      targetPort: {{ .Values.graphqlGateway.port | default 4000 }}
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: {{ .Values.namespace }}
spec:
  type: ExternalName
  externalName: graphql-gateway-service.{{ .Values.namespace }}.svc.cluster.local
  ports:
  - port: 4000
