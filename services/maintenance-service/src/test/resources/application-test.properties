spring.application.name=maintenance-service-test

flotte.postgres.auto-create-databases=false

# Use H2 for tests
spring.datasource.url=jdbc:h2:mem:maintenance_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Kafka for controller tests
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false

# Keycloak properties for test
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/gestion-flotte
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/gestion-flotte/protocol/openid-connect/certs
