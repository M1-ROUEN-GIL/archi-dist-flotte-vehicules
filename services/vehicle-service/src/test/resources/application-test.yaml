flotte:
  postgres:
    auto-create-databases: false

spring:
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        type:
          json_format_mapper: jackson
  kafka:
    enabled: false
    bootstrap-servers: localhost:9092 # Dummy value
