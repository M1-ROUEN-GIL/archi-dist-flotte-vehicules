server:
  port: 8080

spring:
  application:
    name: vehicle-service

  # Configuration de la base de donnees (PostgreSQL)
  datasource:
    url: jdbc:postgresql://localhost:5432/flotte_db
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver

  # Configuration Hibernate / JPA
  jpa:
    hibernate:
      ddl-auto: none # Modifié pour laisser ton script SQL gérer la base
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        type:
          json_format_mapper: jackson

  # Configuration Kafka
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: vehicle-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

# Configuration de l'observabilite (Micrometer + OpenTelemetry)
management:
  endpoints:
    web:
      exposure:
        include: [ "health", "info", "prometheus" ] # Expose les métriques Prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name} # Identifie le service dans Grafana
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0 # Capture 100% des traces pour le démo/test
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4317}
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4317}
    logging:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4317}
logging:
  otlp:
    enabled: true
  level:
    root: INFO
    io.opentelemetry: INFO
    io.micrometer: INFO